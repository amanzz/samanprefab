name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
  TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
  TEST_API_URL: http://localhost:4000
  CI: true

jobs:
  # Job 1: Build and start services
  setup:
    name: Setup Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist
            apps/*/dist
            apps/*/.next

  # Job 2: Run E2E tests
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 30

    services:
      # PostgreSQL for database
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saman_prefab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Setup Database
        working-directory: packages/db
        run: |
          npm run db:migrate
          npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saman_prefab_test

      - name: Start API Server
        working-directory: apps/api
        run: npm start &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saman_prefab_test
          PORT: 4000
          JWT_SECRET: test-secret-for-ci

      - name: Wait for API
        run: |
          echo "Waiting for API..."
          timeout 30 bash -c 'until curl -s http://localhost:4000/api/health > /dev/null; do sleep 1; done'
          echo "API is ready!"

      - name: Start Web Server
        working-directory: apps/web
        run: npm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

      - name: Wait for Web
        run: |
          echo "Waiting for Web..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'
          echo "Web is ready!"

      - name: Run E2E Tests
        run: npx playwright test
        id: test_run

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            e2e-results.json

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-screenshots
          path: test-results/**/*.png

      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🎭 E2E Test Results\n\n';
            
            if ('${{ steps.test_run.outcome }}' === 'success') {
              summary += '✅ **All tests passed**\n\n';
            } else {
              summary += '❌ **Tests failed**\n\n';
              summary += 'Check the [detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n';
            }
            
            summary += '**Artifacts:**\n';
            summary += '- [Test Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # Job 3: Update snapshots (manual trigger only)
  update-snapshots:
    name: Update Visual Snapshots
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Start Services
        run: |
          # Start API and Web in background
          (cd apps/api && npm start &)  
          (cd apps/web && npm start &)
          # Wait for services
          sleep 10

      - name: Update Snapshots
        run: npx playwright test --update-snapshots
        env:
          SNAPSHOT_UPDATE: approved

      - name: Commit Updated Snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add e2e/snapshots/
          git commit -m "chore: update E2E visual snapshots [skip ci]" || echo "No changes to commit"
          git push

  # Job 4: Test Summary Report
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Parse Test Results
        id: parse
        run: |
          if [ -f e2e-results.json ]; then
            PASSED=$(jq '.stats.expected // 0' e2e-results.json)
            FAILED=$(jq '.stats.unexpected // 0' e2e-results.json)
            SKIPPED=$(jq '.stats.skipped // 0' e2e-results.json)
            
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          fi

      - name: Post Summary
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.parse.outputs.passed }}' || 'N/A';
            const failed = '${{ steps.parse.outputs.failed }}' || 'N/A';
            const skipped = '${{ steps.parse.outputs.skipped }}' || 'N/A';
            
            await core.summary
              .addHeading('🎭 E2E Test Summary')
              .addTable([
                [{ data: 'Status', header: true }, { data: 'Count', header: true }],
                ['✅ Passed', passed],
                ['❌ Failed', failed],
                ['⏭️ Skipped', skipped]
              ])
              .addLink('View detailed report', `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`)
              .write();

  # Job 5: Staging Environment Tests
  staging-tests:
    name: Staging Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Staging Tests
        run: npx playwright test --project=chromium-staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          RUN_STAGING_TESTS: true
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_STAGING }}
          PERFORMANCE_ENDPOINT: ${{ secrets.PERFORMANCE_ENDPOINT_STAGING }}

      - name: Upload Staging Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-test-results
          path: |
            test-results/
            playwright-report/

  # Job 6: Merge check - block merge on failure
  merge-check:
    name: Merge Check
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Check Test Results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ E2E tests failed - blocking merge"
            exit 1
          fi
          echo "✅ E2E tests passed - merge allowed"
